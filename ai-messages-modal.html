<!-- AI Messages Modal - Enhanced Display for LED Batch -->
<div id="ai-messages-modal" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 10000; overflow-y: auto; padding: 20px;">
    <div style="max-width: 900px; margin: 40px auto; background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden;">
        
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #207CE5 0%, #004AAD 100%); color: white; padding: 24px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h3 style="margin: 0 0 4px; font-size: 20px; font-weight: 700;">AI Generated Messages</h3>
                <p style="margin: 0; opacity: 0.9; font-size: 13px;" id="ai-modal-lead-info">— Lead Information —</p>
            </div>
            <button onclick="document.getElementById('ai-messages-modal').style.display='none'" style="background: rgba(255,255,255,0.2); border: none; color: white; width: 40px; height: 40px; border-radius: 8px; cursor: pointer; font-size: 20px; display: flex; align-items: center; justify-content: center;">×</button>
        </div>

        <!-- Content -->
        <div style="padding: 28px;">
            
            <!-- Lead Info Card -->
            <div style="background: #f3f4f6; border-left: 4px solid #207CE5; padding: 16px; border-radius: 8px; margin-bottom: 24px;">
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; font-size: 13px;">
                    <div>
                        <span style="color: #6b7280; font-size: 11px; font-weight: 600; text-transform: uppercase;">Name</span>
                        <div style="color: #1f2937; font-weight: 600;" id="ai-modal-name">—</div>
                    </div>
                    <div>
                        <span style="color: #6b7280; font-size: 11px; font-weight: 600; text-transform: uppercase;">Title</span>
                        <div style="color: #1f2937; font-weight: 600;" id="ai-modal-title">—</div>
                    </div>
                    <div>
                        <span style="color: #6b7280; font-size: 11px; font-weight: 600; text-transform: uppercase;">Company</span>
                        <div style="color: #1f2937; font-weight: 600;" id="ai-modal-company">—</div>
                    </div>
                    <div>
                        <span style="color: #6b7280; font-size: 11px; font-weight: 600; text-transform: uppercase;">Email</span>
                        <div style="color: #207CE5; font-weight: 600; word-break: break-all;" id="ai-modal-email">—</div>
                    </div>
                </div>
            </div>

            <!-- Messages Container -->
            <div id="ai-messages-container" style="display: grid; gap: 20px;">
                <!-- Messages will be rendered here -->
            </div>

            <!-- Copy All Button -->
            <button onclick="copyAllAIMessages()" style="background: #10b981; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; margin-top: 24px; display: flex; align-items: center; gap: 8px;">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                    <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                </svg>
                Copy All Messages
            </button>
        </div>
    </div>
</div>

<!-- Improved AI Message Display Style -->
<style>
.ai-message-card {
    background: white;
    border: 1px solid #e5e7eb;
    border-radius: 12px;
    overflow: hidden;
}

.ai-message-header {
    background: #f3f4f6;
    padding: 12px 16px;
    border-bottom: 1px solid #e5e7eb;
    display: flex; align-items: center; gap: 12px;
}

.ai-message-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: white;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
}

.ai-message-badge.step1 { background: linear-gradient(135deg, #3b82f6, #2563eb); }
.ai-message-badge.step2 { background: linear-gradient(135deg, #8b5cf6, #7c3aed); }
.ai-message-badge.step3 { background: linear-gradient(135deg, #f59e0b, #d97706); }

.ai-message-body {
    padding: 16px;
}

.ai-message-subject {
    font-weight: 700;
    color: #1f2937;
    font-size: 14px;
    margin-bottom: 12px;
    padding: 10px;
    background: #fef3c7;
    border-radius: 6px;
    border-left: 3px solid #f59e0b;
}

.ai-message-content {
    color: #374151;
    line-height: 1.7;
    font-size: 13px;
    white-space: pre-wrap;
    word-wrap: break-word;
    background: #fafafa;
    padding: 12px;
    border-radius: 6px;
    border: 1px solid #e5e7eb;
}

.ai-message-footer {
    padding: 12px 16px;
    background: #f9fafb;
    border-top: 1px solid #e5e7eb;
    display: flex; gap: 8px; justify-content: flex-end;
}

.ai-copy-btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
    display: flex; align-items: center; gap: 4px;
    transition: all 0.2s;
}

.ai-copy-btn:hover {
    background: #2563eb;
}

.ai-copy-btn:active {
    transform: scale(0.95);
}
</style>

<!-- JavaScript for AI Messages -->
<script>
function showAIMessages(leadId, leadData) {
    const modal = document.getElementById('ai-messages-modal');
    const container = document.getElementById('ai-messages-container');
    
    // Populate lead info
    document.getElementById('ai-modal-lead-info').textContent = 
        `${leadData.first_name || ''} ${leadData.last_name || ''} — ${leadData.company_name || ''}`;
    document.getElementById('ai-modal-name').textContent = 
        `${leadData.first_name || ''} ${leadData.last_name || ''}`;
    document.getElementById('ai-modal-title').textContent = leadData.title || '—';
    document.getElementById('ai-modal-company').textContent = leadData.company_name || '—';
    document.getElementById('ai-modal-email').textContent = leadData.email || '—';
    
    // Build messages HTML
    const messages = [
        {
            step: 1,
            label: 'Email 1 - Introduction',
            subject: leadData.personalized_subject1 || '',
            body: leadData.personalized_message || '',
            day: 'Sent immediately'
        },
        {
            step: 2,
            label: 'Email 2 - Follow-up',
            subject: leadData.personalized_subject2 || '',
            body: leadData.personalized_followup || '',
            day: '3 days after initial'
        },
        {
            step: 3,
            label: 'Email 3 - Final Outreach',
            subject: leadData.personalized_subject3 || '',
            body: leadData.personalized_email3 || '',
            day: '7 days after initial'
        }
    ];
    
    container.innerHTML = messages
        .filter(m => m.body)
        .map(m => `
        <div class="ai-message-card">
            <div class="ai-message-header">
                <span class="ai-message-badge step${m.step}">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67z"/>
                    </svg>
                    Step ${m.step} • ${m.day}
                </span>
                <span style="color: #6b7280; font-size: 12px; margin-left: auto;">${m.label}</span>
            </div>
            
            <div class="ai-message-body">
                ${m.subject ? `<div class="ai-message-subject">Subject: ${escapeHtml(m.subject)}</div>` : ''}
                <div class="ai-message-content">${escapeHtml(m.body)}</div>
            </div>
            
            <div class="ai-message-footer">
                <button onclick="copyToClipboard('${btoa(m.subject + '\\n\\n' + m.body)}')" class="ai-copy-btn">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path>
                        <rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect>
                    </svg>
                    Copy Email
                </button>
            </div>
        </div>
    `).join('');
    
    modal.style.display = 'block';
    modal.scrollTop = 0;
}

function copyToClipboard(encoded) {
    try {
        const text = atob(encoded);
        navigator.clipboard.writeText(text).then(() => {
            showToast('Email copied to clipboard! ✓', 'success');
        });
    } catch (err) {
        console.error('Error copying:', err);
        showToast('Error copying to clipboard', 'error');
    }
}

function copyAllAIMessages() {
    const modalInfo = document.getElementById('ai-modal-lead-info').textContent;
    const messages = [];
    
    document.querySelectorAll('.ai-message-card').forEach(card => {
        const subject = card.querySelector('.ai-message-subject')?.textContent || '';
        const content = card.querySelector('.ai-message-content')?.textContent || '';
        messages.push(subject + '\n' + content);
    });
    
    const allText = `LEAD: ${modalInfo}\n\n${messages.join('\n\n---\n\n')}`;
    
    navigator.clipboard.writeText(allText).then(() => {
        showToast('All messages copied to clipboard! ✓', 'success');
    }).catch(err => {
        console.error('Error copying:', err);
        showToast('Error copying to clipboard', 'error');
    });
}

// Close modal on background click
document.getElementById('ai-messages-modal')?.addEventListener('click', (e) => {
    if (e.target.id === 'ai-messages-modal') {
        e.target.style.display = 'none';
    }
});
</script>
